name: docs

on:
  push:
  pull_request:

# Least privilege by default; the deploy job widens it below.
permissions:
  contents: read

jobs:
  # Fail if the committed CLI reference is stale, and if the site won't build.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # paramify-sdk is a private repo — give Actions a read token so pip can
      # install the git-pinned dependency. Store it as a repo/org secret.
      # - name: Auth to private SDK
      #   run: git config --global url."https://x-access-token:${{ secrets.SDK_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: CLI reference is in sync with the code
        run: |
          ./scripts/gen-docs.sh
          git diff --exit-code docs/cli-reference.md \
            || { echo "::error::docs/cli-reference.md is stale — run ./scripts/gen-docs.sh and commit."; exit 1; }

      - name: Site builds
        run: mkdocs build --strict

  # Publish to GitHub Pages on main only.
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # - name: Auth to private SDK
      #   run: git config --global url."https://x-access-token:${{ secrets.SDK_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build
        run: mkdocs build --strict
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
