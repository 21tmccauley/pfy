name: release

# Push a version tag to cut a release:  git tag v0.1.0 && git push origin v0.1.0
# This builds a self-contained binary per macOS arch (the private paramify-sdk is
# baked in here, where CI has a token, so end users need no GitHub auth), attaches
# them to a GitHub Release, and bumps the Homebrew formula in the tap.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the release + upload assets in this repo

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub Release (once)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag

  build:
    needs: create-release
    # arm64 only: GitHub has retired the Intel (macos-13) hosted runners, so an
    # x86_64 build can't be produced here. Re-add a macos-13 matrix entry (and the
    # on_intel branch in the formula + its sha in bump-tap) if Intel is ever needed
    # again — e.g. via a self-hosted Intel runner.
    runs-on: macos-14 # Apple Silicon → arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # paramify-sdk is private; give pip a read token so the git-pinned dep
      # resolves. Baked into the binary here — never needed at install time.
      - name: Auth to private SDK
        run: |
          git config --global url."https://x-access-token:${{ secrets.SDK_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install pfy + build tooling
        run: |
          python -m pip install --upgrade pip
          pip install ".[build]"

      - name: Build the self-contained binary
        run: ./scripts/build-binary.sh

      - name: Upload the binary to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/pfy-*.tar.gz --clobber

  bump-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out pfy (for the formula template)
        uses: actions/checkout@v4

      - name: Download the release assets + compute checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release download "${GITHUB_REF_NAME}" --pattern 'pfy-macos-arm64.tar.gz' --dir dist
          sha_arm="$(shasum -a 256 dist/pfy-macos-arm64.tar.gz | awk '{print $1}')"
          sed \
            -e "s/VERSION_PLACEHOLDER/${version}/g" \
            -e "s/SHA_ARM_PLACEHOLDER/${sha_arm}/g" \
            packaging/homebrew/pfy.rb > /tmp/pfy.rb
          echo "Rendered formula:"; cat /tmp/pfy.rb

      - name: Check out the tap and commit the formula
        uses: actions/checkout@v4
        with:
          repository: 21tmccauley/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Push the updated formula
        run: |
          mkdir -p tap/Formula
          cp /tmp/pfy.rb tap/Formula/pfy.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pfy.rb
          git commit -m "pfy ${GITHUB_REF_NAME}" || { echo "no change"; exit 0; }
          git push
