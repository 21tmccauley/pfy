[project]
name = "pfy"
version = "0.1.3"
description = "The Paramify FDE CLI — porcelain workflows + plumbing primitives over paramify-sdk (Typer)"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12",
    "pydantic-settings>=2.2",
    "httpx>=0.27",  # used directly by the NVD client; Paramify goes through the SDK
    "paramify-sdk @ git+https://github.com/paramify/paramify-sdk.git@v0.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "mypy>=1.10",
    "ruff>=0.5",
    "import-linter>=2.0",
]
# Docs site: `pip install -e ".[docs]"`, then `mkdocs serve`. The CLI reference is
# generated from the Typer app by scripts/gen-docs.sh (typer ships the generator).
docs = [
    "mkdocs>=1.6",
    # Cap below 2.0: the 9.x line is MIT-licensed; 2.0 moves to a new license.
    "mkdocs-material>=9.5,<10",
]
# Release build: `pip install -e ".[build]"`, then `scripts/build-binary.sh`
# produces the self-contained binary the Homebrew formula ships.
build = [
    "pyinstaller>=6.0",
]
# MCP delivery: `pip install -e ".[mcp]"`, then `pfy mcp` serves the same
# workflows to an AI agent over stdio. Kept optional so the base CLI (and the
# shipped binary) stay dependency-light — `pfy mcp` imports it lazily.
mcp = [
    "mcp>=1.2",
]

[project.scripts]
pfy = "pfy.app.cli.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pfy"]

# paramify-sdk is pinned by a direct git URL; hatchling blocks those by default
# (PyPI forbids them). pfy is private and never published, so we opt in.
[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

# Typer's whole API is `arg: T = typer.Option(...)` in parameter defaults — the
# intended idiom, so exempt it from B008.
[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["typer.Argument", "typer.Option"]

[tool.mypy]
python_version = "3.11"
mypy_path = "src"
packages = ["pfy"]
disallow_untyped_defs = true
warn_unused_ignores = true
warn_return_any = true
no_implicit_optional = true

# The SDK ships py.typed; when installed, mypy checks against its types. This
# keeps mypy from hard-failing in an env where it isn't installed.
[[tool.mypy.overrides]]
module = "paramify_sdk.*"
ignore_missing_imports = true

# The `mcp` extra is optional (imported lazily by `pfy mcp`); keep mypy green in
# an env that installs pfy without it.
[[tool.mypy.overrides]]
module = "mcp.*"
ignore_missing_imports = true
